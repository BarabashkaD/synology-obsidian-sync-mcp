name: Validate installer

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax
        run: |
          bash -n create-obsidian-user-stack.sh
          bash -n tests/run-linux-integration.sh
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .

  linux-integration:
    name: Linux integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run installer integration test
        run: sudo tests/run-linux-integration.sh
